<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICON MAKER</title>

<link rel="icon" href="icon.PNG">
<link rel="apple-touch-icon" href="icon.PNG">

<style>
body{
  margin:0;
  background:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.header{
  width:100%;
  display:flex;
  align-items:center;
  padding:16px;
}

.logo{
  width:34px;
  height:34px;
  border-radius:8px;
  margin-right:10px;
}

.container{
  max-width:420px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.circle-picker{
  width:260px;
  height:260px;
  border-radius:50%;
  border:2px dashed #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  margin-top:30px;
  color:#888;
}

button{
  margin-top:30px;
  width:220px;
  height:48px;
  border:none;
  border-radius:24px;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;
  font-weight:600;
}

canvas{
  display:none;
}

video{
  margin-top:30px;
  border-radius:16px;
  max-width:100%;
  display:none;
}

/* ===== Loading Overlay (追加部分) ===== */
.loading-overlay{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(4px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.loading-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-weight:600;
  color:#333;
}

.spinner{
  width:44px;
  height:44px;
  border:4px solid #ddd;
  border-top:4px solid #4facfe;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:14px;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <img src="icon.PNG" class="logo">
  <div><b>ICON MAKER</b></div>
</div>

<div class="container">

<div class="circle-picker" id="openPicker">
  ＋ 画像を選択
  <span>(最大12枚)</span>
</div>

<input id="picker" type="file" multiple accept="image/*" style="display:none;">

<button id="start">作成</button>

<canvas id="c" width="400" height="400"></canvas>

<video id="preview" controls playsinline></video>

</div>

<!-- ===== ローディング追加 ===== -->
<div id="loading" class="loading-overlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div>生成中...</div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

const c=document.getElementById("c");
const ctx=c.getContext("2d");
const picker=document.getElementById("picker");
const start=document.getElementById("start");
const preview=document.getElementById("preview");
const openPicker=document.getElementById("openPicker");
const loading=document.getElementById("loading");

const MAX=12;
const INTERVAL=60;
const FINAL_FRAMES=180;

const corners=[
  {x:-1,y:1},
  {x:-1,y:-1},
  {x:1,y:-1},
  {x:1,y:1}
];

let raw=[],pool=[];
let layers=[];
let frame=0;
let spawnIndex=0;
let playing=false;
let finalTimer=0;

openPicker.onclick=()=>picker.click();

picker.onchange=e=>{
  raw=[];
  for(const f of e.target.files){
    const im=new Image();
    im.src=URL.createObjectURL(f);
    raw.push(im);
  }

  openPicker.innerHTML="画像 "+raw.length+" 枚選択済み";

  pool=[];
  for(let i=0;i<MAX;i++) pool.push(raw[i%raw.length]);

  layers=[];
  spawnIndex=0;
  frame=0;
  finalTimer=0;
  playing=false;
};

function draw(img,x,y,r,imgS,ringS){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(r);
  ctx.beginPath();
  ctx.arc(0,0,160*ringS,0,Math.PI*2);
  ctx.clip();

  const sz=Math.min(img.width,img.height);
  ctx.drawImage(
    img,
    (img.width-sz)/2,
    (img.height-sz)/2,
    sz,sz,
    -200*imgS,-200*imgS,400*imgS,400*imgS
  );

  ctx.restore();
}

function spawn(){
  let pos=spawnIndex==0?{x:0,y:0}:corners[(spawnIndex-1)%corners.length];

  layers.push({
    img:pool[spawnIndex],
    t:0,
    x:pos.x*200,
    y:pos.y*200,
    rot:spawnIndex==0?0:(spawnIndex==MAX-1?1.0:0.9),
    imgScale:0.4,
    ringScale:0.4,
    final:spawnIndex==MAX-1
  });

  spawnIndex++;
}

function update(){
  if(!playing){requestAnimationFrame(update);return;}

  frame++;
  if(spawnIndex<MAX && frame%INTERVAL==0) spawn();

  ctx.clearRect(0,0,400,400);

  layers.forEach(L=>{
    L.t+=0.015;
    let p=Math.min(L.t,1);

    let cx=200+L.x*(1-p);
    let cy=200+L.y*(1-p);

    L.imgScale+=0.003;
    L.ringScale+=0.005;

    if(!L.final){
      L.rot-=0.008;
    }else{
      if(p<1){
        L.rot-=0.008;
      }else{
        finalTimer++;

        if(L.rot>0){
          L.rot-=0.01;
          if(L.rot<0) L.rot=0;
        }else if(L.rot<0){
          L.rot+=0.01;
          if(L.rot>0) L.rot=0;
        }

        L.imgScale+=0.004;
        L.ringScale+=0.007;

        if(finalTimer>FINAL_FRAMES){
          playing=false;
          if(recorder) recorder.stop();
        }
      }
    }

    draw(L.img,cx,cy,L.rot,L.imgScale,L.ringScale);
  });

  requestAnimationFrame(update);
}

update();

let recorder,chunks=[];

start.onclick=()=>{

  if(raw.length===0){
    alert("画像を選択してください");
    return;
  }

  loading.style.display="flex"; // ←追加

  layers=[];
  spawnIndex=0;
  frame=0;
  finalTimer=0;
  playing=true;
  spawn();

  chunks=[];
  preview.style.display="none";

  recorder=new MediaRecorder(c.captureStream(30));
  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=()=>{
    loading.style.display="none"; // ←追加

    const blob=new Blob(chunks,{type:recorder.mimeType});
    const url=URL.createObjectURL(blob);
    preview.src=url;
    preview.style.display="block";
    preview.play();

    const a=document.createElement("a");
    a.href=url;
    a.download="circle.mp4";
    a.click();
  };

  recorder.start();
};

});
</script>

</body>
</html>
