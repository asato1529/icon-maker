<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>icon-maker</title>

<link rel="apple-touch-icon" href="icon.PNG">
<link rel="icon" href="icon.PNG">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body{
  margin:0;
  background:#ffffff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ===== ヘッダー ===== */
.header{
  width:100%;
  display:flex;
  align-items:center;
  padding:16px;
  box-sizing:border-box;
}

.logo{
  width:34px;
  height:34px;
  border-radius:8px;
  object-fit:cover;
  margin-right:10px;
}

.title{
  font-weight:600;
  font-size:18px;
}

/* ===== メイン ===== */
.container{
  width:100%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

/* ===== 円選択UI ===== */
.circle-picker{
  width:260px;
  height:260px;
  border-radius:50%;
  border:2px dashed #ccc;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:#888;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  margin-top:30px;
}

.circle-picker:hover{
  border-color:#4facfe;
  color:#4facfe;
}

.circle-picker span{
  font-size:14px;
  margin-top:6px;
}

/* ===== ボタン ===== */
button{
  margin-top:30px;
  width:220px;
  height:48px;
  border:none;
  border-radius:24px;
  font-size:16px;
  font-weight:600;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:white;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

/* ===== 非表示 ===== */
canvas{
  display:none;
}

video{
  margin-top:30px;
  border-radius:16px;
  max-width:100%;
  display:none;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon.PNG" class="logo">
  <div class="title">ICON MAKER</div>
</div>

<div class="container">

  <div class="circle-picker" id="openPicker">
    ＋ 画像を選択
    <span>（最大12枚）</span>
  </div>

  <input id="picker" type="file" multiple accept="image/*" style="display:none;">

  <button id="start">動画を作成</button>

  <canvas id="c" width="400" height="400"></canvas>

  <video id="preview" controls playsinline></video>

</div>

<script>
document.addEventListener("DOMContentLoaded", ()=>{

const c=document.getElementById("c");
const ctx=c.getContext("2d");
const picker=document.getElementById("picker");
const start=document.getElementById("start");
const preview=document.getElementById("preview");
const openPicker=document.getElementById("openPicker");

const MAX=12;
const INTERVAL=60;
const FINAL_FRAMES=180;

const corners=[
  {x:-1,y:1},
  {x:-1,y:-1},
  {x:1,y:-1},
  {x:1,y:1}
];

let raw=[],pool=[];
let layers=[];
let frame=0;
let spawnIndex=0;
let playing=false;
let finalTimer=0;

/* 円タップでファイル選択 */
openPicker.onclick=()=>{
  picker.click();
};

picker.onchange=e=>{
  raw=[];
  for(const f of e.target.files){
    const im=new Image();
    im.src=URL.createObjectURL(f);
    raw.push(im);
  }

  if(raw.length>0){
    openPicker.innerHTML="画像 "+raw.length+" 枚選択済み";
  }

  pool=[];
  for(let i=0;i<MAX;i++) pool.push(raw[i%raw.length]);

  layers=[];
  spawnIndex=0;
  frame=0;
  finalTimer=0;
  playing=false;
};

function draw(img,x,y,r,imgS,ringS){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(r);
  ctx.beginPath();
  ctx.arc(0,0,160*ringS,0,Math.PI*2);
  ctx.clip();

  const sz=Math.min(img.width,img.height);
  ctx.drawImage(
    img,
    (img.width-sz)/2,
    (img.height-sz)/2,
    sz,sz,
    -200*imgS,-200*imgS,400*imgS,400*imgS
  );

  ctx.restore();
}

function spawn(){
  let pos=spawnIndex==0?{x:0,y:0}:corners[(spawnIndex-1)%corners.length];

  layers.push({
    img:pool[spawnIndex],
    t:0,
    x:pos.x*200,
    y:pos.y*200,
    rot:spawnIndex==0?0:(spawnIndex==MAX-1?1.0:0.9),
    imgScale:0.4,
    ringScale:0.4,
    final:spawnIndex==MAX-1
  });

  spawnIndex++;
}

function update(){
  if(!playing){requestAnimationFrame(update);return;}

  frame++;
  if(spawnIndex<MAX && frame%INTERVAL==0) spawn();

  ctx.clearRect(0,0,400,400);

  layers.forEach(L=>{
    L.t+=0.015;
    let p=Math.min(L.t,1);

    let cx=200+L.x*(1-p);
    let cy=200+L.y*(1-p);

    L.imgScale+=0.003;
    L.ringScale+=0.005;

    if(!L.final){
      L.rot-=0.008;
    }else{
      if(p<1){
        L.rot-=0.008;
      }else{
        finalTimer++;

        if(L.rot>0){
          L.rot-=0.01;
          if(L.rot<0) L.rot=0;
        }else if(L.rot<0){
          L.rot+=0.01;
          if(L.rot>0) L.rot=0;
        }

        L.imgScale+=0.004;
        L.ringScale+=0.007;

        if(finalTimer>FINAL_FRAMES){
          playing=false;
          if(recorder) recorder.stop();
        }
      }
    }

    draw(L.img,cx,cy,L.rot,L.imgScale,L.ringScale);
  });

  requestAnimationFrame(update);
}

update();

let recorder,chunks=[];

start.onclick=()=>{
  if(raw.length===0){
    alert("画像を選択してください");
    return;
  }

  layers=[];
  spawnIndex=0;
  frame=0;
  finalTimer=0;
  playing=true;
  spawn();

  chunks=[];
  preview.style.display="none";

  recorder=new MediaRecorder(c.captureStream(60));
  recorder.ondataavailable=e=>chunks.push(e.data);

  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:recorder.mimeType});
    const url=URL.createObjectURL(blob);
    preview.src=url;
    preview.style.display="block";
    preview.play();

    const a=document.createElement("a");
    a.href=url;
    a.download="circle.mp4";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  recorder.start();
};

});
</script>

</body>
</html>
